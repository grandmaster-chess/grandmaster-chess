<!DOCTYPE html>

<html>
<head>

<title>Grandmaster Chess</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<style>

body{
background:#111;
color:#d4af37;
font-family:Arial;
text-align:center;
}

h1{
font-size:40px;
}

#board{
width:500px;
margin:auto;
border:8px solid gold;
}

button{
background:black;
color:gold;
border:2px solid gold;
padding:10px;
margin:10px;
}

</style>

</head>

<body>

<h1>Grandmaster Chess</h1>

<button onclick="newGame()">New Game</button>

<div id="board"></div>

<p id="status"></p>

<script>

let board
let game = new Chess()

let engine = new Worker(
"https://cdn.jsdelivr.net/npm/stockfish/stockfish.js"
)

function newGame(){

game.reset()
board.start()

}

function onDrop(source,target){

let move = game.move({
from:source,
to:target,
promotion:'q'
})

if(move===null) return 'snapback'

engine.postMessage("position fen " + game.fen())
engine.postMessage("go depth 15")

}

engine.onmessage=function(event){

if(event.data.startsWith("bestmove")){

let move = event.data.split(" ")[1]

game.move({
from:move.substring(0,2),
to:move.substring(2,4),
promotion:'q'
})

board.position(game.fen())

}

}

board = Chessboard('board',{
draggable:true,
position:'start',
onDrop:onDrop
})

</script>

</body>
</html>
